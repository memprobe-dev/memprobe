<!-- Option 6: Treemap - recursive memory layout (mirrors the actual UI view) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#1d1d28"/>
      <stop offset="100%" stop-color="#13131a"/>
    </linearGradient>
    <linearGradient id="str" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#5b9cf6"/>
      <stop offset="100%" stop-color="#3dd68c"/>
    </linearGradient>
  </defs>
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="7"
        fill="url(#bg)" stroke="url(#str)" stroke-width="1.5"/>
  <!-- Large left block -->
  <rect x="5.5" y="5.5" width="10" height="21" rx="1.4" fill="#5b9cf6" opacity="0.88"/>
  <!-- Top-right block -->
  <rect x="17"  y="5.5" width="9.5" height="10" rx="1.4" fill="#3dd68c" opacity="0.88"/>
  <!-- Bottom-right subdivided -->
  <rect x="17"  y="17"  width="4.5" height="9.5" rx="1.4" fill="#f0a040" opacity="0.88"/>
  <rect x="22.5" y="17" width="4"   height="4.5" rx="1.4" fill="#3dd68c" opacity="0.5"/>
  <rect x="22.5" y="22.5" width="4" height="4"   rx="1.4" fill="#5b9cf6" opacity="0.35"/>
</svg>
