<!-- 6C: Three columns - narrow blue, wide green, subdivided amber right -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#1d1d28"/>
      <stop offset="100%" stop-color="#13131a"/>
    </linearGradient>
    <linearGradient id="str" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#5b9cf6"/>
      <stop offset="100%" stop-color="#3dd68c"/>
    </linearGradient>
  </defs>
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="7"
        fill="url(#bg)" stroke="url(#str)" stroke-width="1.5"/>
  <!-- Left column (blue) -->
  <rect x="5.5" y="5.5"  width="7"   height="21" rx="1.4" fill="#5b9cf6" opacity="0.88"/>
  <!-- Middle column (green) -->
  <rect x="13.5" y="5.5" width="8"   height="21" rx="1.4" fill="#3dd68c" opacity="0.88"/>
  <!-- Right column top (amber) -->
  <rect x="22.5" y="5.5" width="4"   height="13" rx="1.4" fill="#f0a040" opacity="0.88"/>
  <!-- Right column bottom (blue dim) -->
  <rect x="22.5" y="19.5" width="4"  height="7"  rx="1.4" fill="#5b9cf6" opacity="0.4"/>
</svg>
