<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="2;url=/login">
<title>Sign-in cancelled · memprobe</title>
<link rel="icon" href="/static/logo.svg" type="image/svg+xml">
<link rel="stylesheet" href="/static/styles/base.css">
<style>
  body {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px; text-align: center;
  }
  .card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 14px; padding: 36px 32px; max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,.35);
  }
  .icon {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--bg4); color: var(--text3);
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 18px;
  }
  h1 { font-size: 18px; font-weight: 700; letter-spacing: -.02em; margin: 0 0 8px; }
  p { font-size: 13px; color: var(--text2); line-height: 1.55; margin: 0 0 22px; }
  .meta { font-size: 11px; color: var(--text3); margin-top: 14px; }
  .btn {
    display: inline-block; padding: 10px 22px; border-radius: 8px;
    background: var(--accent); color: #fff; text-decoration: none;
    font-size: 13px; font-weight: 600;
  }
  .btn:hover { opacity: .88; color: #fff; }
</style>
</head>
<body>

{# Consume any queued messages silently so they don't leak to the next page #}
{% if messages %}{% for _m in messages %}{% endfor %}{% endif %}

<div class="card">
  <div class="icon">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </div>
  <h1>Sign-in cancelled</h1>
  <p>No account was created. You can try again any time.</p>
  <a class="btn" href="/login">Back to sign in</a>
  <div class="meta">Redirecting automatically in 2 seconds…</div>
</div>

<script>
  (function () {
    const t = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>

</body>
</html>
